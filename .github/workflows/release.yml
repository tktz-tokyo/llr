name: Release Obsidian Plugin

# タグを push すると、CI でビルド → 署名（attestation）→ GitHub Release を作成する。
# 想定タグ形式: 0.2.0（v プレフィックスなし。Obsidian community plugin 慣習）
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write       # GitHub Release を作る
  id-token: write       # attestation 用の OIDC トークン
  attestations: write   # attestation を発行する

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Tag: $TAG"
          echo "manifest.json: $MANIFEST_VERSION"
          echo "package.json: $PACKAGE_VERSION"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          if [ "$TAG" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            main.js manifest.json styles.css
