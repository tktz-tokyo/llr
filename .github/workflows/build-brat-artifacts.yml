name: Build BRAT Artifacts

on:
  push:
    branches:
      - main
      - 'codex/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-brat-artifacts:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Apply tktz fork patch
        run: node scripts/apply-tktz-fork-patch.mjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Commit patched sources and generated main.js
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "No patch or artifact changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply tktz fork patch and build BRAT artifact"
          git push
